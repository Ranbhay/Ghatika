<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #f1c40f; font-family: sans-serif; 
               display: flex; flex-direction: column; align-items: center; 
               justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        /* Adjusted sizes for a small home screen box */
        .nadi { font-size: 20vw; font-weight: bold; line-height: 1; }
        .pal { font-size: 8vw; color: #e67e22; }
        .label { font-size: 4vw; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="label">Ghaṭikā</div>
    <div class="nadi" id="n">..</div>
    <div class="pal" id="p">.. Pal</div>
    <script>
        async function init() {
            // Using your Agra coordinates
            const res = await fetch('https://api.sunrisesunset.io/json?lat=27.1767&lng=78.0081');
            const data = await res.json();
            const sunrise = new Date(new Date().toDateString() + ' ' + data.results.sunrise);
            
            setInterval(() => {
                let diff = new Date() - sunrise;
                if (diff < 0) diff += 86400000;
                let totalGhatis = (diff / 1000 / 60) / 24;
                let g = Math.floor(totalGhatis);
                let p = Math.floor((totalGhatis - g) * 60);
                document.getElementById('n').innerText = g.toString().padStart(2, '0');
                document.getElementById('p').innerText = p.toString().padStart(2, '0') + " Pal";
            }, 1000);
        }
        init();
    </script>
</body>
</html>
